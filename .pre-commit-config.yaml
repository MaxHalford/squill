repos:
  - repo: local
    hooks:
      - id: frontend-typecheck
        name: frontend type check
        entry: bun run --cwd frontend type-check
        language: system
        files: ^frontend/
        types_or: [ts, vue]
        pass_filenames: false
      - id: frontend-lint
        name: frontend lint
        entry: bun run --cwd frontend lint
        language: system
        files: ^frontend/
        types_or: [ts, vue]
        pass_filenames: false
      - id: frontend-test
        name: frontend tests
        entry: bun run --cwd frontend vitest run
        language: system
        files: ^frontend/
        types_or: [ts, vue]
        pass_filenames: false
